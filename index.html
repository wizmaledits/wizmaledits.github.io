<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WIZMALEDITS</title>

<style>

body{
background:black;
color:white;
font-family:Arial;
text-align:center;
margin:0;
overflow-x:hidden;
}

.neon-bg{
position:fixed;
width:100%;
height:100%;
top:0;
left:0;
background: radial-gradient(circle at 20% 30%, #ff00ff55, transparent 40%),
radial-gradient(circle at 80% 70%, #00ffff55, transparent 40%),
radial-gradient(circle at 50% 90%, #9900ff55, transparent 40%);
animation:movebg 10s infinite alternate;
z-index:-1;
}

@keyframes movebg{
0%{transform:translate(0,0);}
100%{transform:translate(-50px,-50px);}
}

.pfp{
width:160px;
height:160px;
border-radius:50%;
border:4px solid #ff00ff;
box-shadow:0 0 20px #ff00ff,0 0 40px #00ffff;
margin-top:40px;
}

h1{
font-size:40px;
text-shadow:0 0 10px #ff00ff,0 0 20px #00ffff;
}

.bio{
margin-top:10px;
line-height:1.6;
}

.social{
display:inline-block;
margin:20px;
padding:20px;
border-radius:15px;
background:#111;
box-shadow:0 0 20px #ff00ff55;
transition:.3s;
text-decoration:none;
color:white;
width:200px;
}

.social:hover{
transform:scale(1.05);
box-shadow:0 0 30px #00ffff;
}

.social img{
width:60px;
}

.buttons button{
margin:10px;
padding:12px 25px;
border:none;
border-radius:25px;
background:#ff00ff;
color:white;
cursor:pointer;
box-shadow:0 0 10px #ff00ff;
}

.info{
margin-top:20px;
padding:20px;
}

</style>
</head>

<body>

<div class="neon-bg"></div>

<img src="crop_pfp.png" class="pfp">

<h1>WIZMALEDITS</h1>

<div class="bio">
<p>Do you all think I made it?</p>
<p>Is it trust I'm not having...</p>
<p><b>JOIN BELOW FOR EDITING HELP!</b></p>
</div>

<div>

<a class="social" href="https://www.tiktok.com/@wizmaledits" target="_blank">
<img src="https://upload.wikimedia.org/wikipedia/commons/a/a9/TikTok_logo.svg">
<h3>TikTok</h3>
</a>

<a class="social" href="https://discord.gg/X2f7HmA3Wv" target="_blank">
<img src="https://upload.wikimedia.org/wikipedia/en/9/98/Discord_logo.svg">
<h3>Discord</h3>
</a>

</div>

<div class="buttons">
<button onclick="show('me')">About Me</button>
<button onclick="show('channel')">About Channel</button>
</div>

<div class="info" id="info">
Welcome to my site.
</div>

<script>

function show(type){

if(type==="me"){
document.getElementById("info").innerHTML=
"I make anime edits with neon style effects and emotional scenes.";
}

if(type==="channel"){
document.getElementById("info").innerHTML=
"My TikTok page is focused on anime edits, mainly Darling in the Franxx.";
}

}

</script>

</body>
</html>
